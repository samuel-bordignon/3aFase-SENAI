<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup InkluaCoins</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .popup-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }
        .popup {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.3s ease-in-out;
        }
        .popup h2 {
            color: #5A33E0;
        }
        .popup p {
            color: #333;
        }
        .popup button {
            background: #5A33E0;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .popup button:hover {
            background: #4a29c9;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="popup-container" id="popupContainer">
        <div class="popup">
            <h2>Seu ingresso pode sair mais barato!</h2>
            <p>Deixe seu comentário nos eventos que participou e ganhe InkluaCoins.<br>
               Quanto mais você compartilha sua experiência, mais descontos pode garantir nos próximos ingressos!</p>
            <button onclick="fecharPopup()">Entendi!</button>
        </div>
    </div>
    
    <script>
        function abrirPopup() {
            document.getElementById('popupContainer').style.display = 'flex';
        }
        function fecharPopup() {
            document.getElementById('popupContainer').style.display = 'none';
        }
        window.onload = function() {
            setTimeout(abrirPopup, 1000); // Abre o popup após 1s
        };
    </script>
</body>
</html>
